<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#1e1e1e; }
#terminal { width:100%; height:100%; padding: 4px; }
</style>
</head>
<body>
<div id="terminal"></div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.9.0/lib/addon-web-links.min.js"></script>
<script>
var term;
var fitAddon;

try {
    term = new Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: 'Consolas, "Courier New", monospace',
        theme: {
            background: '#1e1e1e',
            foreground: '#d4d4d4',
            cursor: '#d4d4d4',
            selectionBackground: '#264f78',
            black: '#000000',
            red: '#cd3131',
            green: '#0dbc79',
            yellow: '#e5e510',
            blue: '#2472c8',
            magenta: '#bc3fbc',
            cyan: '#11a8cd',
            white: '#e5e5e5',
            brightBlack: '#666666',
            brightRed: '#f14c4c',
            brightGreen: '#23d18b',
            brightYellow: '#f5f543',
            brightBlue: '#3b8eea',
            brightMagenta: '#d670d6',
            brightCyan: '#29b8db',
            brightWhite: '#ffffff'
        },
        scrollback: 10000,
        allowProposedApi: true
    });
    fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);

    // Add web links support
    try {
        var webLinksAddon = new WebLinksAddon.WebLinksAddon();
        term.loadAddon(webLinksAddon);
    } catch(e) {
        // web links addon optional
    }

    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    term.onData(function(data) {
        if (window.Android) {
            window.Android.onTerminalInput(data);
        }
    });

    // Notify Android that terminal is ready
    if (window.Android) {
        window.Android.onTerminalReady();
    }
} catch(e) {
    document.body.innerHTML = '<pre style="color:red;padding:16px">' + e.stack + '</pre>';
}

function writeTerminal(text) {
    if (term) term.write(text);
}

function clearTerminal() {
    if (term) term.clear();
}

function resizeTerminal() {
    if (fitAddon) {
        setTimeout(function() {
            fitAddon.fit();
        }, 100);
    }
}

window.addEventListener('resize', resizeTerminal);

// Auto-resize on load
window.addEventListener('load', resizeTerminal);
</script>
</body>
</html>
